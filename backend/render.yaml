# Render Blueprint — free tier web service + link to external Neon Postgres.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: cmms-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build && bash scripts/cloud-seed.sh
    startCommand: bash scripts/cloud-start.sh
    healthCheckPath: /api/v1
    envVars:
      - key: NODE_VERSION
        value: '20'
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: WEB_ORIGIN
        sync: false
      - key: SEED_DEMO
        value: 'true'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cmms
    ports:
      - '5432:5432'
    volumes:
      - cmms_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d cmms']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cmms_pg_data:
